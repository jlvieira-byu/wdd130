<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="estilos/formulario-pesquisa.css">
</head>

<body>
    <header>

    </header>
    <main>
        <form>
            <label for="nome_completo">Nome Completo:</label>
            <input type="text" id="nome_completo" name="nome_completo" required>
            <label for="emaildousuario">E-mail:</label>
            <input type="email" id="emaildousuario" name="emaildousuario" required>
            <label for="navegador">Selecione um Navegador:</label>
            <select name="navegador" id="navegador">
                <option value="chrome">Chrome</option>
                <option value="safari">Safari</option>
                <option value="edge">Edge</option>
            </select>
            <label for="pet">Você tem um bichinho de estimação em casa?</label>
            <input type="checkbox" id="pet" name="pet">
            <label for="feedback">Liste os lugares onde você morou:</label>
            <textarea name="feedback" id="feedback" rows="4" cols="4" placeholder="Lugares...">
            </textarea>
            <button type="submit">Enviar pesquisa</button>
        </form>
    </main>
    <footer>

    </footer>
</body>

</html>

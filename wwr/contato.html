<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fale Conosco - Bote Laranja Rafting S.A.</title>
  <meta name="description" content="Fale conosco através dos contatos oficiais da empresa Bote Laranja Rafting S.A.">
  <meta name="author" content="João Vieira">
  <link rel="stylesheet" href="estilos/rafting.css">
</head>

<body>
  <header>
    <img src="imagens/rafting-boat.png" alt="Bote laranja de rafting">
    <nav>
      <a href="index.html">Página Inicial</a>
      <a href="sobre.html">Sobre Nós</a>
      <a href="passeios.html">Passeios</a>
      <a href="contato.html">Fale Conosco</a>
    </nav>
  </header>

  <main>
    <section class="contatos">
      <h1>Bote Laranja Rafting S.A.</h1>
      <p>Estrada Brotas-Patrimônio, Km 18
        <br>Brotas, São Paulo
        <br>+55 11 91234-5678
        <br>info@botelaranja.rft
      </p>
    </section>

    <section class="map-formulario">
      <iframe
        src="https://www.google.com/maps/embed?pb=!1m14!1m12!1m3!1d3688.709605394074!2d-48.04183309300894!3d-22.402302325299562!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!5e0!3m2!1spt-BR!2sbr!4v1781336216766!5m2!1spt-BR!2sbr"
        width="450" height="310" allowfullscreen="" loading="lazy" referrerpolicy="no-referrer-when-downgrade">
      </iframe>

      <form>
        <div class="campo-formulario">
          <label for="nome-usuario">Nome:</label>
          <input type="text" id="nome-usuario" name="nome-usuario" placeholder="Digite aqui...">
        </div>
        <div class="campo-formulario">
          <label for="email-usuario">E-mail:</label>
          <input type="email" name="email-usuario" id="email-usuario" placeholder="Digite aqui...">
        </div>
        <div class="campo-formulario">
          <label for="proposito-usuario">Propósito da Mensagem:</label>
          <fieldset>
            <label><input type="radio" name="proposito-usuario" id="consulta" value="consulta" checked> Consulta
              Geral</label>
            <label><input type="radio" name="proposito-usuario" id="reserva" value="reserva"> Pergunta sobre
              Reserva</label>
            <label><input type="radio" name="proposito-usuario" id="sugestao" value="sugestao"> Sugestão de Site</label>
          </fieldset>
        </div>
        <div class="campo-formulario">
          <label for="mensagem-usuario">Mensagem:</label>
          <textarea name="mensagem-usuario" id="mensagem-usuario" rows="4" placeholder="Digite aqui..."></textarea>
        </div>
        <div class="campo-formulario-checkbox">
          <input type="checkbox" name="newsletter-usuario" id="newsletter-usuario">
          <label for="newsletter-usuario">Quero receber a newsletter mensal</label>
        </div>

        <button class="botao-formulario" type="submit">Entrar em Contato!</button>

      </form>
    </section>

    <section class="funcionarios">
      <h2>Estamos Aqui para Servi-lo</h2>
      <div>
        <figure>
          <img src="imagens/contato-bruce.jpg" alt="Bruce - Coordenador de Expedições">
          <figcaption>Bruce - Coordenador de Expedições</figcaption>
        </figure>
        <figure>
          <img src="imagens/contato-christina.jpg" alt="Cristina - CEO">
          <figcaption>Cristina - CEO</figcaption>
        </figure>
        <figure>
          <img src="imagens/contato-yara.jpg" alt="Yara - Coordenadora de Provisões">
          <figcaption>Yara - Coordenadora de Provisões</figcaption>
        </figure>
      </div>
    </section>

    <footer>
      <p>&copy; 2026 &#10070; Bote Laranja Rafting S.A. &#10070; João Vieira</p>
      <!-- <nav class="redes-sociais"> -->
      <nav class="redes-sociais">
        <a href="https://facebook.com"><img src="imagens/facebook-logo.png" alt="Ícone do Facebook"></a>
        <a href="https://linkedin.com"><img src="imagens/linkedin-logo.png" alt="Ícone do Linkedin"></a>
        <a href="https://instagram.com"><img src="imagens/instagram-logo.png" alt="Ícone do Instagram"></a>
      </nav>
    </footer>
  </main>
</body>

</html>

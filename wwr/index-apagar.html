<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Página Inicial - Bote Laranja Rafting S.A.</title>
  <meta name="description"
    content="Página principal da empresa Bote Laranja Rafting S.A. Navegue para conhecer mais sobre nós e nossos passeios, e esteja à vontade para entrar em contato e agendar sua próxima aventura!">
  <meta name="author" content="João Vieira">
  <link rel="stylesheet" href="estilos/rafting copy.css">
</head>

<body>
  <header>
    <img src="imagens/rafting-boat.png" alt="Bote laranja de rafting">
    <nav>
      <a href="index.html">Página Inicial</a>
      <a href="sobre.html">Sobre Nós</a>
      <a href="passeios.html">Passeios</a>
      <a href="contato.html">Fale Conosco</a>
    </nav>
  </header>

  <main>
    <div class="hero-index">
      <img src="imagens/index-hero.jpg" alt="Pessoas fazendo rafting em corredeira">
      <h1>A Aventura Já Vai Começar!</h1>
      <form class="news-formulario">
        <div class="campo-formulario">
          <label>Se inscreva para receber nossa newsletter!</label>
          <label for="nome-usuario">Nome:</label>
          <input type="text" id="nome-usuario" name="nome-usuario" placeholder="Digite aqui...">
        </div>
        <div class="campo-formulario">
          <label for="email-usuario">E-mail:</label>
          <input type="email" name="email-usuario" id="email-usuario" placeholder="Digite aqui...">
        </div>
        <div>
          <button class="botao-formulario" type="submit">Quero me inscrever!</button>
        </div>
      </form>
    </div>

    <div class="news-formulario">
      <section class="chamada-passeios">
        <h2>Já escolheu seu próximo desafio?</h2>
        <p>Embarque já em uma de nossas odisséias!</p>
        <a href="passeios.html">Nossos Passeios</a>
      </section>


    </div>

    <section class="finalidade-ofertas">
      <!-- <h2>Adventure Awaits You!</h2> -->
      <h2>A aventura está te esperando!</h2>
      <div>
        <figure>
          <img src="imagens/index-finalidade.jpg" alt="Rio Cetina - Croácia">
          <figcaption>Teremos prazer em conectar você às melhores experiências de rafting, unindo diversão, bem-estar,
            aventura e contato direto com a natureza.</figcaption>
        </figure>
        <figure>
          <img src="imagens/index-ofertas.jpg" alt="Oferta de passeios o ano todo!">
          <figcaption>Aqui a aventura nunca acaba, e os melhores preços também não. Aproveite nossas ofertas especiais,
            afinal, para nós, é Black Friday o ano todo!</figcaption>
        </figure>
      </div>
    </section>

    <footer>
      <p>&copy; 2026 &#10070; Bote Laranja Rafting S.A. &#10070; João Vieira</p>
      <nav class="redes-sociais">
        <!-- <nav class="socialmedia"> -->
        <a href="https://facebook.com"><img src="imagens/facebook-logo.png" alt="Ícone do Facebook"></a>
        <a href="https://linkedin.com"><img src="imagens/linkedin-logo.png" alt="Ícone do Linkedin"></a>
        <a href="https://instagram.com"><img src="imagens/instagram-logo.png" alt="Ícone do Instagram"></a>
      </nav>
    </footer>
  </main>
</body>

</html>
